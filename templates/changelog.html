{% extends "base.html" %}
{% block title %}Changelog — LMS{% endblock %}
{% block content %}
<div class="space-y-6">
    <!-- Build Info Cards -->
    <div class="bg-gray-800 rounded-lg p-5 border border-gray-700">
        <h2 class="text-sm font-semibold text-cyan-400 uppercase tracking-wide mb-4">Build Info</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
            <div class="bg-gray-900 rounded p-3 border border-gray-700">
                <p class="text-xs text-gray-400 uppercase mb-1">Version</p>
                <p class="font-mono text-gray-200 text-lg">{{ version }}</p>
            </div>
            <div class="bg-gray-900 rounded p-3 border border-gray-700">
                <p class="text-xs text-gray-400 uppercase mb-1">Commit</p>
                <p class="font-mono text-cyan-400 cursor-pointer hover:text-cyan-300" onclick="navigator.clipboard.writeText('{{ git_hash }}');showToast('Copied hash',false)" data-tip="Click to copy">{{ git_hash }}</p>
            </div>
            <div class="bg-gray-900 rounded p-3 border border-gray-700">
                <p class="text-xs text-gray-400 uppercase mb-1">Built</p>
                <p class="font-mono text-gray-200">{{ build_time }}</p>
            </div>
            <div class="bg-gray-900 rounded p-3 border border-gray-700">
                <p class="text-xs text-gray-400 uppercase mb-1">Stack</p>
                <p class="text-xs text-gray-300">Rust + Axum + Askama + htmx</p>
            </div>
        </div>
    </div>

    <!-- Recent Commits -->
    <div class="bg-gray-800 rounded-lg p-5 border border-gray-700">
        <h2 class="text-sm font-semibold text-green-400 uppercase tracking-wide mb-4">Recent Commits</h2>
        <div class="space-y-1" id="commits"></div>
    </div>
</div>

<script>
const rawLog = {{ git_log|json|safe }};
const container = document.getElementById('commits');

rawLog.split('\n').filter(l => l.trim()).forEach(line => {
    const match = line.match(/^([a-f0-9]+)\s+(.+)$/);
    if (!match) return;
    const [, hash, msg] = match;

    // Detect conventional commit type
    let type = 'other';
    let badge = '<span class="text-[10px] px-1.5 py-0.5 rounded bg-gray-700 text-gray-400">other</span>';
    if (msg.startsWith('feat')) { type = 'feat'; badge = '<span class="text-[10px] px-1.5 py-0.5 rounded bg-green-900 text-green-300">feat</span>'; }
    else if (msg.startsWith('fix')) { type = 'fix'; badge = '<span class="text-[10px] px-1.5 py-0.5 rounded bg-red-900 text-red-300">fix</span>'; }
    else if (msg.startsWith('refactor')) { type = 'refactor'; badge = '<span class="text-[10px] px-1.5 py-0.5 rounded bg-purple-900 text-purple-300">refactor</span>'; }
    else if (msg.startsWith('docs')) { type = 'docs'; badge = '<span class="text-[10px] px-1.5 py-0.5 rounded bg-blue-900 text-blue-300">docs</span>'; }
    else if (msg.startsWith('chore') || msg.startsWith('build') || msg.startsWith('ci')) { type = 'chore'; badge = '<span class="text-[10px] px-1.5 py-0.5 rounded bg-gray-700 text-gray-300">chore</span>'; }
    else if (msg.startsWith('test')) { type = 'test'; badge = '<span class="text-[10px] px-1.5 py-0.5 rounded bg-yellow-900 text-yellow-300">test</span>'; }
    else if (msg.startsWith('perf')) { type = 'perf'; badge = '<span class="text-[10px] px-1.5 py-0.5 rounded bg-orange-900 text-orange-300">perf</span>'; }

    // Strip type prefix from message for cleaner display
    const cleanMsg = msg.replace(/^(feat|fix|refactor|docs|chore|build|ci|test|perf)(\(.+?\))?[!]?:\s*/, '');

    const row = document.createElement('div');
    row.className = 'flex items-center gap-3 py-1.5 px-2 rounded hover:bg-gray-700/30';
    row.innerHTML = `
        <code class="text-xs text-cyan-400/70 font-mono shrink-0 cursor-pointer hover:text-cyan-300" onclick="navigator.clipboard.writeText('${hash}');showToast('Copied',false)" data-tip="Copy hash">${hash}</code>
        ${badge}
        <span class="text-sm text-gray-200 truncate">${cleanMsg || msg}</span>
    `;
    container.appendChild(row);
});
</script>
{% endblock %}
